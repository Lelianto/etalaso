name: Google Maps Scraper

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Region to scrape'
        required: false
        type: choice
        options:
          - all
          - tangsel
          - kota_tangerang
          - kab_tangerang
      kecamatan:
        description: 'Kecamatan spesifik (1 per run)'
        required: false
        type: choice
        options:
          - all
          # Tangsel (7 kecamatan)
          - ciputat
          - ciputat_timur
          - pamulang
          - pondok_aren
          - serpong
          - serpong_utara
          - setu
          # Kota Tangerang (13 kecamatan)
          - batuceper
          - benda
          - cibodas
          - ciledug
          - cipondoh
          - jatiuwung
          - karang_tengah
          - karawaci
          - larangan
          - neglasari
          - periuk
          - pinang
          - tangerang
          # Kab Tangerang (29 kecamatan)
          - balaraja
          - cikupa
          - cisauk
          - cisoka
          - curug
          - gunung_kaler
          - jambe
          - jayanti
          - kelapa_dua
          - kemiri
          - kosambi
          - kresek
          - kronjo
          - legok
          - mauk
          - mekar_baru
          - pagedangan
          - pakuhaji
          - panongan
          - pasar_kemis
          - rajeg
          - sepatan
          - sepatan_timur
          - sindang_jaya
          - solear
          - sukadiri
          - sukamulya
          - teluknaga
          - tigaraksa
      category:
        description: 'Category filter (kosongkan untuk semua)'
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: |
          ARGS=""

          # Region filter
          if [ "${{ inputs.region }}" != "all" ] && [ -n "${{ inputs.region }}" ]; then
            ARGS="--region=${{ inputs.region }}"
          fi

          # Kecamatan filter
          if [ "${{ inputs.kecamatan }}" != "all" ] && [ -n "${{ inputs.kecamatan }}" ]; then
            ARGS="$ARGS --kecamatan=${{ inputs.kecamatan }}"
          fi

          # Category filter
          if [ -n "${{ inputs.category }}" ]; then
            ARGS="$ARGS --category=${{ inputs.category }}"
          fi

          echo "Running: npx tsx tools/scraper/scrape-places.ts $ARGS"
          npx tsx tools/scraper/scrape-places.ts $ARGS 2>&1 | tee scraper.log

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-${{ inputs.region || 'all' }}-${{ inputs.kecamatan || 'all' }}-${{ github.run_number }}
          path: |
            tools/scraper/seed-data/
            scraper.log
          retention-days: 30
